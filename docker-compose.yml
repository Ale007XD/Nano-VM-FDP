services:
  postgres:
    image: postgres:17-alpine
    container_name: fdp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: food_delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: fdp-app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/food_delivery
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/food_delivery
      APP_ENV: development
      APP_DEBUG: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      LOG_LEVEL: INFO
      ADMIN_API_KEY: dev-admin-key
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

volumes:
  postgres_data:
